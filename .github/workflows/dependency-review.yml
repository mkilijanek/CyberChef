name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on newly introduced critical and high vulnerabilities
          fail-on-severity: high

          # Only check for vulnerabilities, not licenses (too many false positives
          # from complex SPDX expressions in dompurify, protobufjs, etc.)
          license-check: false
          vulnerability-check: true

          # Create comment on PR with results
          comment-summary-in-pr: always
